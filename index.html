<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語生詞練習：單句填空</title>
    <style>
        /* 基礎排版與字體 */
        body {
            font-family: '微軟正黑體', sans-serif;
            background-color: #f4f7f6;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 遊戲主要容器 */
        #game-container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 進度條與標題 */
        #progress-text {
            font-size: 16px;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* 句子顯示區 */
        #sentence-container {
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 12px;
            border-left: 5px solid #3498db;
            text-align: left;
        }

        /* 挖空的底線 */
        .blank-space {
            display: inline-block;
            min-width: 60px;
            padding: 0 10px;
            height: 30px;
            border-bottom: 3px solid #34495e;
            text-align: center;
            font-weight: bold;
            color: #e74c3c;
        }

        /* 填入正確答案後的樣式 */
        .blank-filled {
            color: #27ae60;
            border-bottom-color: #27ae60;
        }

        /* 選項按鈕區 */
        #options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #bdc3c7;
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 漢字樣式 */
        .option-hanzi {
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        /* 拼音樣式 */
        .option-pinyin {
            font-size: 16px;
            color: #7f8c8d;
        }

        /* 按鈕互動效果 */
        .option-btn:hover {
            border-color: #3498db;
            background-color: #f0f8ff;
            transform: translateY(-2px);
        }

        .option-btn:active {
            transform: translateY(1px);
        }

        /* 答錯樣式 (紅色+震動) */
        .option-btn.wrong {
            border-color: #e74c3c;
            background-color: #fadbd8;
            pointer-events: none; /* 答錯後不可再點 */
            opacity: 0.6;
            animation: shake 0.4s;
        }

        /* 答對樣式 (綠色) */
        .option-btn.correct {
            border-color: #2ecc71;
            background-color: #d5f5e3;
            pointer-events: none;
            transform: scale(1.05);
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* 結束畫面 */
        #end-screen {
            display: none;
        }

        #end-screen h1 {
            color: #27ae60;
            font-size: 36px;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            font-weight: bold;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background: #2980b9;
        }

        /* 手機版單排顯示 */
        @media (max-width: 480px) {
            #options-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="quiz-screen">
            <div id="progress-text">第 1 題 / 共 5 題</div>
            <div id="sentence-container">
                </div>
            <div id="options-container">
                </div>
        </div>

        <div id="end-screen">
            <h1>🎉 太棒了！全部答對！</h1>
            <p style="font-size: 18px; color: #555; margin-bottom: 30px;">你已經完成了所有的生詞練習。</p>
            <button id="restart-btn" onclick="startGame()">再練習一次</button>
        </div>

    </div>

    <script>
        // 題庫資料 (包含句子、正解、干擾項與拼音)
        const quizData = [
            {
                part1: "這個學期，馬丁、陳月美......他們趁學期結束以前的一個週末，到張老師家 ",
                part2: " 餃子。",
                answer: "包",
                options: [
                    { hanzi: "包", pinyin: "bāo" },
                    { hanzi: "洗", pinyin: "xǐ" },
                    { hanzi: "煮", pinyin: "zhǔ" },
                    { hanzi: "脫", pinyin: "tuō" }
                ]
            },
            {
                part1: "張老師已經把餃子 ",
                part2: " 跟餃子皮都準備好了。",
                answer: "餡兒",
                options: [
                    { hanzi: "材料", pinyin: "cáiliào" },
                    { hanzi: "餡兒", pinyin: "xiànr" },
                    { hanzi: "鍋子", pinyin: "guōzi" },
                    { hanzi: "碗", pinyin: "wǎn" }
                ]
            },
            {
                part1: "到了老師家以後，張老師就教他們......怎麼包不容易煮 ",
                part2: "。",
                answer: "破",
                options: [
                    { hanzi: "壞", pinyin: "huài" },
                    { hanzi: "扁", pinyin: "biǎn" },
                    { hanzi: "飽", pinyin: "bǎo" },
                    { hanzi: "破", pinyin: "pò" }
                ]
            },
            {
                part1: "大家嚐了泡菜都說 ",
                part2: " 李東健會做泡菜。",
                answer: "看不出來",
                options: [
                    { hanzi: "看不出來", pinyin: "kàn bù chūlái" },
                    { hanzi: "吃不下去", pinyin: "chī bù xiàqù" },
                    { hanzi: "做不出來", pinyin: "zuò bù chūlái" },
                    { hanzi: "買不到", pinyin: "mǎi bú dào" }
                ]
            },
            {
                part1: "李東健說他是跟媽媽學的......先把大白菜 ",
                part2: " 乾淨，加鹽拌一拌。",
                answer: "洗",
                options: [
                    { hanzi: "做", pinyin: "zuò" },
                    { hanzi: "包", pinyin: "bāo" },
                    { hanzi: "洗", pinyin: "xǐ" },
                    { hanzi: "煮", pinyin: "zhǔ" }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        const quizScreen = document.getElementById('quiz-screen');
        const endScreen = document.getElementById('end-screen');
        const sentenceContainer = document.getElementById('sentence-container');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress-text');

        // 初始化/重新開始遊戲
        function startGame() {
            currentQuestionIndex = 0;
            quizScreen.style.display = 'block';
            endScreen.style.display = 'none';
            loadQuestion();
        }

        // 載入當前題目
        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            
            // 更新進度條
            progressText.textContent = `第 ${currentQuestionIndex + 1} 題 / 共 ${quizData.length} 題`;

            // 組合句子與挖空處
            sentenceContainer.innerHTML = `
                ${currentData.part1}
                <span id="blank-spot" class="blank-space">______</span>
                ${currentData.part2}
            `;

            // 清空並載入選項
            optionsContainer.innerHTML = '';
            
            // 將選項隨機打亂，避免正確答案永遠在同一個位置
            const shuffledOptions = [...currentData.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                
                btn.innerHTML = `
                    <div class="option-hanzi">${opt.hanzi}</div>
                    <div class="option-pinyin">${opt.pinyin}</div>
                `;

                // 綁定點擊事件
                btn.addEventListener('click', () => checkAnswer(btn, opt.hanzi, currentData.answer));
                optionsContainer.appendChild(btn);
            });
        }

        // 檢查答案邏輯
        function checkAnswer(clickedBtn, selectedHanzi, correctHanzi) {
            const blankSpot = document.getElementById('blank-spot');

            if (selectedHanzi === correctHanzi) {
                // 答對了
                clickedBtn.classList.add('correct');
                blankSpot.textContent = correctHanzi;
                blankSpot.classList.add('blank-filled');

                // 禁用所有按鈕，避免重複點擊
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.style.pointerEvents = 'none');

                // 停頓 1.2 秒後進入下一題
                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < quizData.length) {
                        loadQuestion();
                    } else {
                        showEndScreen();
                    }
                }, 1200);

            } else {
                // 答錯了
                clickedBtn.classList.add('wrong');
            }
        }

        // 顯示結束畫面
        function showEndScreen() {
            quizScreen.style.display = 'none';
            endScreen.style.display = 'block';
        }

        // 網頁載入完成後啟動
        window.onload = startGame;
    </script>
</body>
</html>
